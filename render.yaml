services:
  - type: web
    name: india-logistics-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: logistics-redis
          type: keyvalue
          property: connectionString
      - key: API_KEYS
        sync: false
    healthCheckPath: /healthz
    autoDeploy: true
  - type: keyvalue
    name: logistics-redis
    plan: free
    ipAllowList: []

databases:
  - name: logistics-db
    plan: free
    databaseName: logistics
    user: logistics_user
    postgresMajorVersion: 15
