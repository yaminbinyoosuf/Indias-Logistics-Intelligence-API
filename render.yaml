services:
  - type: web
    name: india-logistics-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: logistics-redis
          type: redis
          property: connectionString
      - key: API_KEYS
        sync: false
    healthCheckPath: /healthz
    autoDeploy: true

databases:
  - name: logistics-db
    databaseName: logistics
    user: logistics_user
    postgresMajorVersion: 15

  - name: logistics-redis
    type: redis
    plan: free
